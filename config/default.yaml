llm:
  router:
    base_url: "http://localhost:1234/v1"
    model: "qwen2.5-3b-instruct"
    temperature: 0.2
    max_tokens: 350
  brain:
    base_url: "http://localhost:1234/v1"
    model: "qwen2.5-7b-instruct-uncensored"
    temperature: 0.6
    max_tokens: 500
  prompt_budget:
    max_chars_total: 16000
    max_chars_tool_results: 7000
    max_chars_memory_router: 2500
    max_chars_memory_brain: 8000
    retry_on_overflow: true

debug:
  console_verbose: false

tts:
  engine: "luxtts"         # luxtts | piper | maya1
  piper_voice_model: "models/tts/piper/voices/en_US/amy/medium/en_US-amy-medium.onnx"
  output_wav: "data/cache/tts_last.wav"
  ignore_parentheses: true
  luxtts:
    reference_voice_wav: "models/tts/luxtts/voices/Alon-Voice.wav"
    device: "cuda"
    ref_duration: 6
    num_step: 6
    guidance_scale: 3.5
    speed: 1.0
    t_shift: 0.5
    target_rms: 0.1
    feat_scale: 0.1
    disable_transcriber: false
    timeout_sec: 20
    max_tts_chars: 0
    max_sentences: 0
    max_sentence_chars: 130
    normalize_peak: 0.85
    silence_peak_threshold: 0.01
    add_energy_exclamation: true
    silence_trim:
      enabled: false
      threshold: 0.025
      min_silence_sec: 0.60
      keep_silence_sec: 0.12
      min_silence_start_ms: 50
      min_non_silence_ms: 30
    voice_pack:
      default: "neutral"
      voices:
        energetic: "models/tts/luxtts/voices/energetic.wav"
        neutral: "models/tts/luxtts/voices/neutral.wav"
        calm: "models/tts/luxtts/voices/calm.wav"
        serious: "models/tts/luxtts/voices/serious.wav"
    guidance_scale_by_mood:
      energetic: 3.4
      neutral: 3.6
      calm: 3.8
      serious: 3.9
  maya1:
    model_dir: "models/tts/maya1"
    device: "cuda"
    dtype: "float16"

assistant:
  name: "Alon"
  system_style: "You are Alon. Keep answers short (1-3 sentences), friendly, and suitable for speaking aloud."
  timezone: "Asia/Yerevan"

ui:
  max_links: 5
  fancy_terminal: true

logging:
  jsonl_path: "data/memory/alon_log.jsonl"

router:
  mode: "rules"   # rules | llm (we’ll keep rules for now)

planner:
  enabled: true

composer:
  max_input_chars: 500

tool_backend:
  mode: "auto"   # auto | mcp | local

mcp:
  enabled: true
  transport: "stdio"  # auto | http | stdio
  endpoint: ""    # e.g. http://127.0.0.1:8765/mcp
  timeout_sec: 20
  list_method: "tools/list"
  call_method: "tools/call"
  stdio:
    command: "docker"   # e.g. "npx" or "uvx"
    args: [
        "mcp",
        "gateway",
        "run"
      ]      # e.g. ["-y","@modelcontextprotocol/server-duckduckgo"]
    cwd: ""
    env:  {
          "LOCALAPPDATA": "C:\\Users\\PC\\AppData\\Local",
          "ProgramData": "C:\\ProgramData",
          "ProgramFiles": "C:\\Program Files"
          }
    initialize_on_connect: true
    initialize_method: "initialize"
    initialized_notify_method: "notifications/initialized"
    tool_call_param_order: "name_arguments"  # name_arguments | tool_args
    message_format: "ndjson"  # ndjson | framed
  aliases:
    weather.forecast:
      - "openweather.get_forecast"
      - "weather.get_forecast"
      - "weather.forecast"
    weather.get_forecast:
      - "openweather.get_forecast"
      - "weather.get_forecast"
    websearch.search:
      - "duckduckgo.search"
      - "duckduckgo.web_search"
      - "websearch.search"
      - "search"
      - "wikipedia.search"
    filesystem.list:
      - "filesystem.list"
      - "filesystem.list_dir"
    filesystem.read:
      - "filesystem.read"
      - "filesystem.read_file"
    filesystem.tail:
      - "filesystem.tail"
      - "filesystem.read_tail"

tools:
  weather:
    enabled: true  # we’ll turn on when implemented
    default_location: "Yerevan"
    forecast_days: 3
  websearch:
    enabled: true
    provider: "gemini"   # gemini | local
    max_results: 5
    fetch_top_n_pages: 2
    user_agent: "ALON/1.0 (+local assistant)"
    timeout_sec: 20
    request_timeout_sec: 15
    cache_ttl_seconds: 21600
    max_chars_per_page_clean: 12000
    max_chars_per_chunk: 2500
    max_chunks_per_page: 6
    llm_chunk_max_tokens: 250
    llm_reduce_max_tokens: 300
    llm_final_max_tokens: 350
    max_source_checks: 5
    min_match_score: 0.35
    gemini:
      enabled: true
      api_key_env: "GEMINI_API_KEY"
      api_key_file: ".env"
      model: "gemini-2.0-flash"
      base_url: "https://generativelanguage.googleapis.com/v1beta"
      timeout_sec: 20
      max_output_tokens: 350
      min_answer_match_score: 0.25
  filesystem:
    enabled: true
    allowed_roots:
      - "."
    max_read_bytes: 200000
    max_list_entries: 200
    max_search_files: 200
    max_search_hits: 200
    deny_extensions:
      - ".exe"
      - ".dll"
      - ".bin"
      - ".onnx"
      - ".zip"
      - ".7z"
      - ".rar"
      - ".png"
      - ".jpg"
      - ".jpeg"
      - ".gif"
      - ".mp4"
      - ".wav"
      - ".pyd"
    deny_dirs:
      - ".git"
      - ".venv"
      - "venv"
      - "__pycache__"
      - "node_modules"
      - "dist"
      - "build"
    deny_name_contains:
      - "secret"
      - "token"
      - "password"
      - "credential"
      - "apikey"
      - "id_rsa"
      - ".env"
  executor:
    enabled: true
    mode: "wsl"
    timeout_sec: 120
    allowlist:
      - "python"
      - "pip"
      - "git"
      - "node"
      - "npm"
      - "powershell"
      - "cmd"
      - "bash"
  codex:
    enabled: true
    output_filename: "codex_result.md"
    command:
      - "codex"
      - "exec"
      - "--skip-git-repo-check"
      - "-"
    wsl_prelude: "source ~/.nvm/nvm.sh"
    timeout_sec: 180

orchestrator:
  llm_tool_planner:
    enabled: true

filesystem:
  allow_roots:
    - "%USERPROFILE%/Desktop"
    - "%USERPROFILE%/Documents"
    - "<PROJECT_ROOT>"
  max_file_bytes: 1000000
  max_read_chars: 20000
  max_list_items: 50
  enabled: true

memory:
  recent_turns: 20
  default_recent_turns: 20
  max_turns: 200
  router_default_turns_cold: 8
  brain_default_turns_cold: 30
  min_turns_retry: 6
  max_tool_content_chars: 4000
  max_range_days: 14
  hard_mode: true
  max_context_chars: 1800
  max_relevant_chars: 1200

search:
  enabled: true

weather:
  enabled: true
